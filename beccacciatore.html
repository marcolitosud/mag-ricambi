<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#2C4A2B" />

<!-- PWA manifest (inline) -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Beccacciatore" />
<meta name="format-detection" content="telephone=no" />

<title>Beccacciatore</title>

<!-- PWA manifest inline (data URI) -->
<link rel="manifest" id="manifest-link" />

<!-- Icone -->
<link rel="apple-touch-icon" sizes="180x180" id="apple-icon" />
<link rel="apple-touch-icon-precomposed" sizes="180x180" id="apple-icon-pre" />
<link rel="icon" type="image/png" id="favicon" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Leaflet (mappa) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" crossorigin="anonymous" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" crossorigin="anonymous"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ============================================================================
   PALETTE & TOKENS
   ============================================================================ */
:root {
  --paper: #F3EADB;
  --paper-2: #EBE0CD;
  --paper-edge: #D9C9AE;
  --ink: #1F1A12;
  --ink-soft: #4A4034;
  --ink-mute: #7A6E5E;
  --forest: #2C4A2B;
  --forest-deep: #1A2F1A;
  --forest-soft: #5A7856;
  --russet: #A84F2E;
  --russet-deep: #7A3A22;
  --ochre: #C8A165;
  --sage: #8A9A7B;
  --red: #8B2E20;
  --gray: #8A8272;
  --shadow: 0 1px 2px rgba(31,26,18,.08), 0 4px 12px rgba(31,26,18,.06);
  --shadow-lg: 0 4px 16px rgba(31,26,18,.10), 0 16px 32px rgba(31,26,18,.08);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 22px;
  --font-display: 'Fraunces', 'Times New Roman', serif;
  --font-ui: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  --header-h: 54px;
  --tab-h: 64px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overscroll-behavior: none; }

body {
  font-family: var(--font-ui);
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
  line-height: 1.5;
  overflow: hidden;
}

.hidden { display: none !important; }

/* ============================================================================
   LAYOUT APP
   ============================================================================ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  max-height: 100dvh;
  position: relative;
  overflow: hidden;
}

/* Filigrana beccaccia centrata (solo su schermate non-mappa) */
#app::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 82%;
  max-width: 340px;
  aspect-ratio: 640 / 555;
  background-image: var(--bird-bg);
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  opacity: 0.08;
  filter: sepia(0.15);
  pointer-events: none;
  z-index: 1;
}
#app.on-mappa::before { display: none; }

/* Texture carta */
#app::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.15  0 0 0 0 0.12  0 0 0 0 0.08  0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  opacity: .4;
  pointer-events: none;
  z-index: 2;
  mix-blend-mode: multiply;
}
#app.on-mappa::after { display: none; }

/* ============================================================================
   HEADER
   ============================================================================ */
.app-header {
  height: var(--header-h);
  padding: 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(243, 234, 219, 0.94);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--paper-edge);
  position: relative;
  z-index: 30;
  flex-shrink: 0;
  padding-top: env(safe-area-inset-top, 0);
  height: calc(var(--header-h) + env(safe-area-inset-top, 0));
}
.brand {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 19px;
  letter-spacing: -0.01em;
  color: var(--forest-deep);
  flex: 1;
  justify-content: center;
}
.brand em { color: var(--russet); }
.brand-bird {
  width: 30px; height: 30px;
  background-image: var(--bird-sm);
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  flex-shrink: 0;
}

.header-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: grid; place-items: center;
  background: transparent;
  border: none;
  color: var(--ink-soft);
  cursor: pointer;
  flex-shrink: 0;
}
.header-btn:active { background: var(--paper-2); }
.header-btn svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; }

.header-btn.back { display: none; }
body.can-back .header-btn.back { display: grid; }

/* ============================================================================
   MAIN
   ============================================================================ */
main {
  flex: 1;
  overflow: hidden;
  position: relative;
  z-index: 5;
}
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px calc(var(--tab-h) + env(safe-area-inset-bottom, 0) + 18px);
  display: none;
}
.screen.active {
  display: block;
}
.screen.no-pad { padding: 0 !important; }

/* ============================================================================
   TAB BAR
   ============================================================================ */
.tab-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + env(safe-area-inset-bottom, 0));
  padding-bottom: env(safe-area-inset-bottom, 0);
  background: rgba(243,234,219,.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-top: 1px solid var(--paper-edge);
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  z-index: 30;
}
.tab {
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px;
  color: var(--ink-mute);
  font-family: var(--font-ui);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0;
  padding: 4px 2px;
  transition: color .15s;
}
.tab svg {
  width: 20px; height: 20px;
  stroke: currentColor; stroke-width: 1.6; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.tab.active { color: var(--forest-deep); }
.tab.active svg { color: var(--russet); }

/* ============================================================================
   FAB
   ============================================================================ */
.fab {
  position: absolute;
  right: 16px;
  bottom: calc(var(--tab-h) + env(safe-area-inset-bottom, 0) + 16px);
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--russet);
  color: var(--paper);
  border: none;
  display: grid; place-items: center;
  cursor: pointer;
  z-index: 35;
  box-shadow: 0 4px 14px rgba(168,79,46,.45), 0 2px 4px rgba(0,0,0,.15);
  transition: transform .15s;
}
.fab:active { transform: scale(.95); }
.fab svg {
  width: 26px; height: 26px;
  stroke: currentColor; stroke-width: 2.2; fill: none;
  stroke-linecap: round;
}
.fab:disabled { opacity: .5; cursor: not-allowed; }

/* ============================================================================
   TIPOGRAFIA
   ============================================================================ */
h1.screen-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 28px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--forest-deep);
  margin-bottom: 2px;
}
h1.screen-title em {
  font-style: italic;
  color: var(--russet);
  font-weight: 400;
}
.subtitle {
  font-size: 13px;
  color: var(--ink-mute);
  margin-bottom: 20px;
  letter-spacing: 0.01em;
}
h2 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin: 22px 0 10px;
}
h2:first-child { margin-top: 0; }

/* ============================================================================
   HOME DASHBOARD
   ============================================================================ */
.greeting {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  position: relative;
  z-index: 3;
}
.greeting .hi {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 500;
  line-height: 1.1;
  color: var(--forest-deep);
  letter-spacing: -0.02em;
}
.greeting .hi em { font-style: italic; color: var(--russet); }
.greeting .date {
  font-size: 11px;
  color: var(--ink-mute);
  text-align: right;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 600;
  line-height: 1.35;
}

.season-card {
  background: linear-gradient(135deg, var(--forest-deep) 0%, var(--forest) 100%);
  color: var(--paper);
  border-radius: var(--radius-lg);
  padding: 18px;
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
  z-index: 3;
}
.season-card::after {
  content: '';
  position: absolute;
  right: -30px; top: -30px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(200,161,101,.25) 0%, transparent 60%);
  pointer-events: none;
}
.season-card > * { position: relative; z-index: 1; }
.season-card .label {
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ochre);
  font-weight: 600;
  margin-bottom: 3px;
}
.season-card .title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  line-height: 1.1;
  margin-bottom: 12px;
}
.season-card .progress {
  height: 6px;
  background: rgba(243,234,219,.18);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 8px;
}
.season-card .progress > span {
  display: block;
  height: 100%;
  background: var(--ochre);
  border-radius: 3px;
  transition: width .4s;
}
.season-card .meta {
  display: flex;
  justify-content: space-between;
  font-size: 11.5px;
  color: rgba(243,234,219,.8);
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 16px;
  position: relative;
  z-index: 3;
}
.stat {
  background: var(--paper-2);
  border: 1px solid var(--paper-edge);
  border-radius: var(--radius);
  padding: 13px;
}
.stat .v {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 500;
  line-height: 1;
  color: var(--forest-deep);
  letter-spacing: -0.02em;
}
.stat .v em {
  font-style: italic;
  color: var(--russet);
}
.stat .l {
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-weight: 600;
  margin-top: 4px;
}

/* Card cane */
.dog-card {
  display: flex;
  gap: 12px;
  align-items: center;
  background: var(--paper-2);
  border: 1px solid var(--paper-edge);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  position: relative;
  z-index: 3;
}
.dog-card:active { transform: scale(.99); }
.dog-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--forest-deep);
  color: var(--paper);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 500;
  flex-shrink: 0;
}
.dog-card .info { flex: 1; min-width: 0; }
.dog-card h3 {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 500;
  color: var(--ink);
}
.dog-card .breed {
  font-size: 12px;
  color: var(--ink-mute);
  margin-top: 2px;
}

.add-btn {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--forest-deep);
  border: 1.5px dashed var(--forest);
  border-radius: var(--radius);
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
  position: relative;
  z-index: 3;
}
.add-btn:active { background: var(--paper-2); }

/* Compagnia */
.compagnia-card {
  background: var(--paper-2);
  border: 1px solid var(--paper-edge);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 16px;
  position: relative;
  z-index: 3;
}
.compagnia-card .title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  color: var(--forest-deep);
  margin-bottom: 2px;
}
.compagnia-card .title em { color: var(--russet); font-style: italic; }
.compagnia-card .motto {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-mute);
  margin-bottom: 10px;
}
.compagnia-members {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.member-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  color: var(--paper);
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 2px 4px rgba(0,0,0,.12);
}

/* ============================================================================
   LOGIN + CHOOSER
   ============================================================================ */
.login-overlay {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(1000px 600px at 30% 20%, rgba(200,161,101,.08), transparent 60%),
    radial-gradient(800px 500px at 70% 80%, rgba(44,74,43,.12), transparent 60%),
    #1F1A12;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
}
.login-card {
  width: 100%;
  max-width: 370px;
  background: var(--paper);
  border-radius: 22px;
  padding: 28px 22px 22px;
  box-shadow: 0 30px 60px rgba(0,0,0,.4);
  text-align: center;
  position: relative;
}
.login-bird {
  width: 68px; height: 68px;
  margin: 0 auto 12px;
  border-radius: 50%;
  background: var(--paper-2);
  background-image: var(--bird-sm);
  background-size: 82%;
  background-repeat: no-repeat;
  background-position: center;
  border: 2px solid var(--ochre);
}
.login-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 500;
  color: var(--forest-deep);
  letter-spacing: -0.01em;
}
.login-title em { font-style: italic; color: var(--russet); }
.login-sub {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-mute);
  margin-top: 4px;
  margin-bottom: 20px;
}
.login-field {
  margin-bottom: 10px;
  text-align: left;
}
.login-field label {
  display: block;
  font-size: 10.5px;
  color: var(--ink-mute);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}
.login-field input {
  width: 100%;
  padding: 11px 13px;
  border: 1px solid var(--paper-edge);
  border-radius: 10px;
  background: var(--paper-2);
  font-family: var(--font-ui);
  font-size: 15px;
  color: var(--ink);
  -webkit-appearance: none;
  appearance: none;
}
.login-field input:focus {
  outline: none;
  border-color: var(--forest);
  background: var(--paper);
}
.login-btn {
  width: 100%;
  padding: 13px;
  background: var(--russet);
  color: var(--paper);
  border: none;
  border-radius: 11px;
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 6px;
  transition: transform .12s;
}
.login-btn:active { transform: scale(.98); }
.login-error {
  font-size: 12.5px;
  color: var(--red);
  text-align: center;
  margin-top: 10px;
  min-height: 18px;
  font-weight: 600;
}
.login-footer {
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 18px;
}
.login-footer b { color: var(--russet); }

.chooser-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.chooser-card {
  padding: 14px 8px;
  border: 1px solid var(--paper-edge);
  border-radius: 14px;
  background: var(--paper-2);
  cursor: pointer;
  font-family: var(--font-ui);
  transition: transform .1s;
  text-align: center;
}
.chooser-card:active { transform: scale(.97); }
.chooser-avatar {
  width: 50px; height: 50px;
  border-radius: 50%;
  margin: 0 auto 6px;
  display: grid; place-items: center;
  color: var(--paper);
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 500;
  box-shadow: 0 3px 8px rgba(0,0,0,.15);
}
.chooser-name {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--forest-deep);
  font-weight: 500;
}
.chooser-role {
  font-size: 9.5px;
  color: var(--ink-mute);
  margin-top: 1px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ============================================================================
   FORM
   ============================================================================ */
.field { margin-bottom: 14px; position: relative; z-index: 3; }
.field label {
  display: block;
  font-size: 11px;
  color: var(--ink-mute);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 11px 13px;
  border: 1px solid var(--paper-edge);
  border-radius: var(--radius-sm);
  background: var(--paper);
  font-family: var(--font-ui);
  font-size: 14px;
  color: var(--ink);
  -webkit-appearance: none;
  appearance: none;
}
.field select {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%237A6E5E' d='M6 8L0 2l1.4-1.4L6 5.2 10.6.6 12 2z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 32px;
}
.field textarea { min-height: 70px; resize: vertical; font-family: var(--font-ui); }
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--forest);
}
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.field-hint {
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 4px;
  font-style: italic;
}

.chip-row {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.chip {
  padding: 7px 12px;
  border-radius: 18px;
  border: 1px solid var(--paper-edge);
  background: var(--paper);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all .12s;
  font-family: var(--font-ui);
  user-select: none;
}
.chip:active { transform: scale(.96); }
.chip.on {
  background: var(--forest-deep);
  border-color: var(--forest-deep);
  color: var(--paper);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--russet);
  color: var(--paper);
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 18px;
  transition: transform .12s;
  position: relative;
  z-index: 3;
}
.btn-primary:active { transform: scale(.99); }
.btn-primary:disabled { opacity: .6; cursor: wait; }

.btn-secondary {
  width: 100%;
  padding: 14px;
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--paper-edge);
  border-radius: var(--radius);
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  position: relative;
  z-index: 3;
}

.btn-danger {
  background: none;
  border: none;
  color: var(--red);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 10px 14px;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.form-error {
  color: var(--red);
  font-size: 13px;
  font-weight: 600;
  text-align: center;
  margin-top: 10px;
  min-height: 18px;
  position: relative;
  z-index: 3;
}

/* ============================================================================
   LISTE (diario, ecc)
   ============================================================================ */
.list-card {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  background: var(--paper-2);
  border: 1px solid var(--paper-edge);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  position: relative;
  z-index: 3;
}
.list-card:active { transform: scale(.99); }
.date-badge {
  flex-shrink: 0;
  width: 44px;
  text-align: center;
  border-right: 1px solid var(--paper-edge);
  padding-right: 12px;
}
.date-badge .d {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  line-height: 1;
  color: var(--forest-deep);
}
.date-badge .m {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-top: 3px;
  font-weight: 600;
}
.list-card .body { flex: 1; min-width: 0; }
.list-card .title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 2px;
}
.list-card .sub {
  font-size: 12px;
  color: var(--ink-mute);
}
.list-card .note {
  font-size: 12px;
  color: var(--ink-soft);
  font-style: italic;
  margin-top: 5px;
  padding-top: 5px;
  border-top: 1px dashed var(--paper-edge);
}

.month-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 8px 2px;
  border-bottom: 1px dashed var(--paper-edge);
  margin: 14px 0 8px;
  position: relative;
  z-index: 3;
}
.month-head:first-child { margin-top: 0; }
.month-head .name {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 16px;
  color: var(--forest-deep);
}
.month-head .sum {
  font-size: 11px;
  color: var(--ink-mute);
  font-weight: 600;
}

.empty {
  text-align: center;
  padding: 36px 20px;
  position: relative;
  z-index: 3;
}
.empty .icon {
  font-size: 38px;
  opacity: 0.6;
  margin-bottom: 8px;
}
.empty .title {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--forest-deep);
  margin-bottom: 4px;
}
.empty .sub {
  font-size: 12.5px;
  color: var(--ink-mute);
  max-width: 260px;
  margin: 0 auto 12px;
  line-height: 1.5;
}
.empty b { color: var(--russet); }

/* ============================================================================
   DETTAGLIO
   ============================================================================ */
.detail-head {
  background: linear-gradient(135deg, var(--forest-deep) 0%, var(--forest) 100%);
  color: var(--paper);
  margin: -16px -16px 16px;
  padding: 20px 16px 22px;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  position: relative;
  overflow: hidden;
}
.detail-head::after {
  content: '';
  position: absolute;
  right: -40px; bottom: -40px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(200,161,101,.2) 0%, transparent 60%);
}
.detail-head > * { position: relative; z-index: 1; }
.detail-head h1 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 500;
  line-height: 1.15;
}
.detail-head .when {
  font-size: 13px;
  color: rgba(243,234,219,.75);
  margin-top: 3px;
}
.meta-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 14px;
  position: relative;
  z-index: 3;
}
.meta-cell {
  background: var(--paper-2);
  border: 1px solid var(--paper-edge);
  border-radius: var(--radius-sm);
  padding: 10px;
}
.meta-cell .k {
  font-size: 10px;
  color: var(--ink-mute);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.meta-cell .v {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--ink);
  font-weight: 500;
  margin-top: 2px;
  text-transform: capitalize;
}
.note-box {
  background: var(--paper-2);
  border: 1px solid var(--paper-edge);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-style: italic;
  color: var(--ink-soft);
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 14px;
  position: relative;
  z-index: 3;
}

/* ============================================================================
   MAPPA
   ============================================================================ */
#screen-mappa { padding: 0 !important; }

#map {
  position: absolute;
  top: 0; left: 0; right: 0;
  bottom: 0;
  background: #a8c0a0;
  z-index: 1;
}

.map-banner {
  position: absolute;
  top: 10px; left: 10px; right: 10px;
  background: rgba(243,234,219,.96);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--paper-edge);
  border-radius: var(--radius);
  padding: 10px 12px;
  z-index: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow);
  font-size: 13px;
  color: var(--ink-soft);
}
.map-banner.attiva {
  background: linear-gradient(135deg, var(--forest-deep), var(--forest));
  color: var(--paper);
  border-color: transparent;
}
.map-banner-text { flex: 1; min-width: 0; line-height: 1.3; }
.map-banner-text b { font-weight: 700; }
.map-banner-text .sub {
  font-size: 11px;
  opacity: 0.85;
  display: block;
  margin-top: 1px;
}
.map-banner-btn {
  background: var(--russet);
  color: var(--paper);
  border: none;
  padding: 6px 10px;
  border-radius: 16px;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.map-banner.attiva .map-banner-btn { display: none; }

.gps-badge {
  position: absolute;
  top: 62px; right: 10px;
  background: rgba(243,234,219,.96);
  border: 1px solid var(--paper-edge);
  border-radius: 18px;
  padding: 5px 11px;
  z-index: 480;
  box-shadow: var(--shadow);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  gap: 6px;
}
.gps-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gray);
  animation: gps-pulse 1.8s infinite;
}
.gps-badge.ok .gps-dot {
  background: var(--forest);
  box-shadow: 0 0 0 0 rgba(44,74,43,.6);
}
.gps-badge.err .gps-dot {
  background: var(--red);
  animation: none;
}
@keyframes gps-pulse {
  0% { box-shadow: 0 0 0 0 rgba(138,130,114,.5); }
  70% { box-shadow: 0 0 0 7px rgba(138,130,114,0); }
  100% { box-shadow: 0 0 0 0 rgba(138,130,114,0); }
}

.map-legend {
  position: absolute;
  left: 10px;
  bottom: 10px;
  background: rgba(243,234,219,.96);
  border: 1px solid var(--paper-edge);
  border-radius: var(--radius);
  padding: 7px 12px;
  z-index: 480;
  display: flex;
  gap: 14px;
  box-shadow: var(--shadow);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-soft);
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
}
.legend-item .dot {
  width: 11px; height: 11px;
  border-radius: 50%;
  border: 1.5px solid var(--paper);
}

/* Selettore stile mappa (Satellite / Topo / Strada) */
.map-style-picker {
  position: absolute;
  top: 104px;
  right: 10px;
  z-index: 470;
  display: flex;
  flex-direction: column;
  gap: 2px;
  background: rgba(243,234,219,.96);
  border: 1px solid var(--paper-edge);
  border-radius: 10px;
  padding: 3px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.map-style-btn {
  background: transparent;
  border: none;
  padding: 7px 12px;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  border-radius: 8px;
  white-space: nowrap;
  min-width: 74px;
  text-align: center;
}
.map-style-btn.on {
  background: var(--forest-deep);
  color: var(--paper);
}

/* Marker mappa */
.event-pin {
  width: 26px; height: 26px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  border: 2.5px solid var(--paper);
  box-shadow: 0 2px 6px rgba(0,0,0,.35);
  display: flex; align-items: center; justify-content: center;
}
.event-pin .inner {
  transform: rotate(45deg);
  font-size: 12px;
  line-height: 1;
}
.event-pin.incontro { background: var(--ochre); }
.event-pin.abbattuta { background: var(--russet); }

.user-pin {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #1e90ff;
  border: 3px solid white;
  box-shadow: 0 0 0 0 rgba(30,144,255,.5);
  animation: user-pulse 2s infinite;
}
@keyframes user-pulse {
  0% { box-shadow: 0 0 0 0 rgba(30,144,255,.5); }
  70% { box-shadow: 0 0 0 14px rgba(30,144,255,0); }
  100% { box-shadow: 0 0 0 0 rgba(30,144,255,0); }
}

.leaflet-popup-content-wrapper {
  background: var(--paper) !important;
  border-radius: var(--radius) !important;
  border: 1px solid var(--paper-edge) !important;
}
.leaflet-popup-content {
  font-family: var(--font-ui) !important;
  margin: 10px 14px !important;
  min-width: 180px;
}
.leaflet-popup-tip {
  background: var(--paper) !important;
}
.popup-title {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--forest-deep);
  font-weight: 500;
  text-transform: capitalize;
  margin-bottom: 3px;
}
.popup-meta {
  font-size: 12px;
  color: var(--ink-mute);
  line-height: 1.4;
}
.popup-note {
  font-size: 12px;
  color: var(--ink-soft);
  font-style: italic;
  padding-top: 5px;
  margin-top: 5px;
  border-top: 1px dashed var(--paper-edge);
}
.popup-del {
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--paper-edge);
  text-align: right;
}
.popup-del button {
  background: none; border: none;
  color: var(--red);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: underline;
}

/* ============================================================================
   MENU UTENTE (3 puntini)
   ============================================================================ */
.menu-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(31,26,18,.3);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.menu-backdrop.on { opacity: 1; pointer-events: auto; }
.user-menu {
  position: absolute;
  top: calc(var(--header-h) + env(safe-area-inset-top, 0) + 4px);
  right: 10px;
  background: var(--paper);
  border: 1px solid var(--paper-edge);
  border-radius: 12px;
  min-width: 210px;
  box-shadow: 0 10px 30px rgba(0,0,0,.2);
  z-index: 110;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
  transition: opacity .2s, transform .2s;
}
.user-menu.on {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.user-menu-hdr {
  padding: 11px 14px;
  border-bottom: 1px solid var(--paper-edge);
}
.user-menu-hdr .n {
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--forest-deep);
  font-weight: 500;
}
.user-menu-hdr .r {
  font-size: 10.5px;
  color: var(--ink-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 1px;
}
.user-menu-item {
  display: block;
  padding: 11px 14px;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  font-family: var(--font-ui);
  font-size: 14px;
  color: var(--ink);
  cursor: pointer;
}
.user-menu-item:active { background: var(--paper-2); }
.user-menu-item.danger { color: var(--red); }

/* ============================================================================
   RESPONSIVE
   ============================================================================ */
@media (min-width: 640px) {
  /* Su schermi grandi: app a pieno schermo, contenuto delle schermate limitato in larghezza */
  body { background: var(--paper); }
  #app {
    max-width: 100%;
    width: 100%;
    height: 100dvh;
    margin: 0;
  }
  .screen {
    max-width: 560px;
    margin: 0 auto;
    position: relative;
    padding: 24px 20px calc(var(--tab-h) + env(safe-area-inset-bottom, 0) + 18px);
  }
  /* Eccezione: la mappa resta fullscreen dell'area disponibile */
  .screen.no-pad { max-width: 100%; padding: 0; }
  #map { inset: 0; }

  .app-header {
    padding-left: 24px;
    padding-right: 20px;
  }
  .tab-bar {
    max-width: 100%;
  }
  /* Il FAB resta ancorato al lato destro del viewport */
  .fab {
    right: max(20px, calc((100vw - 600px) / 2));
  }
}

/* Toast */
.toast {
  position: fixed;
  bottom: calc(var(--tab-h) + env(safe-area-inset-bottom, 0) + 90px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--forest-deep);
  color: var(--paper);
  padding: 10px 18px;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 6px 20px rgba(0,0,0,.3);
  z-index: 9000;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
}
.toast.on {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>

  async function sha256(s) {
    const buf = new TextEncoder().encode(s);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  const MESI_LUNGHI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const MESI_CORTI = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const GIORNI = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  function formatDurata(min) {
    if (!min) return '';
    const h = Math.floor(min / 60);
    const m = min % 60;
    if (!h) return m + "'";
    if (!m) return h + 'h';
    return h + 'h ' + String(m).padStart(2, '0') + "'";
  }

  function formatDataCorta(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.getDate() + ' ' + MESI_CORTI[d.getMonth()].toLowerCase();
  }

  function formatDataLunga(iso) {
    const d = new Date(iso + 'T00:00:00');
    return `${GIORNI[d.getDay()]} ${d.getDate()} ${MESI_LUNGHI[d.getMonth()].toLowerCase()} ${d.getFullYear()}`;
  }

  function statoStagione() {
    const oggi = new Date();
    const m = oggi.getMonth();
    const y = oggi.getFullYear();
    if (m >= 8) return { label: 'Stagione in corso', startYear: y, endYear: y+1, inCorso: true };
    if (m === 0) return { label: 'Stagione in corso', startYear: y-1, endYear: y, inCorso: true };
    return { label: 'Stagione chiusa', startYear: y-1, endYear: y, inCorso: false };
  }

  function salutoOrario() {
    const h = new Date().getHours();
    if (h < 5) return 'Buonanotte';
    if (h < 13) return 'Buongiorno';
    if (h < 18) return 'Buon pomeriggio';
    return 'Buonasera';
  }

  function toast(msg, dur = 2400) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), dur);
  }

  // ======================================================================
  // NAVIGAZIONE (stack con back)
  // ======================================================================
  const MAIN_SCREENS = ['home', 'diario', 'mappa', 'allenamento', 'riserva', 'stats'];
  const Nav = {
    stack: ['home'],

    async go(name, ...args) {
      // Se è una schermata "principale", resetta lo stack alla home e ricarica dati
      if (MAIN_SCREENS.includes(name)) {
        Nav.stack = [name];
        // Ricarica dati freschi dal DB prima di renderizzare
        // (così la home riflette sempre lo stato attuale)
        await Data.loadAll();
      } else {
        Nav.stack.push(name);
      }
      Nav._render(name, args);
    },

    back() {
      if (Nav.stack.length > 1) {
        Nav.stack.pop();
        const prev = Nav.stack[Nav.stack.length - 1];
        // Se torniamo a una schermata main, ricarica dati
        if (MAIN_SCREENS.includes(prev)) {
          Data.loadAll().then(() => Nav._render(prev));
        } else {
          Nav._render(prev);
        }
      } else {
        Nav.go('home');
      }
    },

    _render(name, args = []) {
      // Chiudi eventuale menu
      Menu.close();

      // Nascondi tutte le schermate
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

      // Aggiorna classe body per back button
      document.body.classList.toggle('can-back', Nav.stack.length > 1);

      // Aggiorna classe app per filigrana
      document.getElementById('app').classList.toggle('on-mappa', name === 'mappa');

      // Aggiorna tab attivo
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.screen === name);
      });

      // Aggiorna FAB
      FAB.update(name);

      // Render schermata
      switch (name) {
        case 'home': Screens.home(); break;
        case 'diario': Screens.diario(); break;
        case 'mappa': Screens.mappa(); break;
        case 'allenamento': Screens.allenamento(); break;
        case 'riserva': Screens.riserva(); break;
        case 'stats': Screens.stats(); break;
        case 'form-uscita': Screens.formUscita(args[0]); break;
        case 'form-cane': Screens.formCane(args[0]); break;
        case 'form-allenamento': Screens.formAllenamento(); break;
        case 'form-riserva': Screens.formRiserva(); break;
        case 'form-punto': Screens.formPunto(); break;
        case 'dettaglio': Screens.dettaglio(args[0], args[1]); break;
      }

      // Scrolla alla top
      const el = document.getElementById('screen-' + name);
      if (el) el.scrollTop = 0;
    },
  };

  const FAB = {
    update(screenName) {

    // Stats del carniere
    // In stagione: conta solo uscite/eventi dentro la stagione venatoria
    // Fuori stagione: conta TUTTO (altrimenti mostra 0 e sembra rotto)
    let usciteCarniere, eventiCarniere, labelCarniere;
    if (stag.inCorso) {
      const startDate = `${stag.startYear}-09-01`;
      const endDate = `${stag.endYear}-02-01`;
      usciteCarniere = Data.uscite.filter(u => u.data >= startDate && u.data < endDate);
      const usciteIds = new Set(usciteCarniere.map(u => u.id));

    } else {

      eventiCarniere = Data.eventi;
      labelCarniere = 'Totale attività';
    }
    const nIncontri = eventiCarniere.filter(e => e.tipo === 'incontro').length;

    // Progresso stagione (se in corso)
    let progresso = 100;
    if (stag.inCorso) {

      const chiusura = new Date(stag.endYear, 0, 20);
      const tot = (chiusura - apertura) / (1000*60*60*24);
      const passed = (oggi - apertura) / (1000*60*60*24);
      progresso = Math.max(0, Math.min(100, (passed/tot)*100));

    el.innerHTML = `

  Screens._dogCardHtml = function(c) {
    const eta = c.data_nascita ? Screens._calcolaEta(c.data_nascita) : null;
    const breed = [c.razza, eta ? eta + ' ' + (eta === 1 ? 'anno' : 'anni') : null].filter(Boolean).join(' · ');
    return `
      <div class="dog-card" onclick="Nav.go('form-cane', '${c.id}')">
        <div class="dog-avatar" style="background:${Screens._dogColor(c.nome)};">${c.nome[0].toUpperCase()}</div>
        <div class="info">
          <h3>${escapeHtml(c.nome)}</h3>
          <div class="breed">${escapeHtml(breed || 'Cane da caccia')}</div>
        </div>
      </div>`;
  };

  Screens._calcolaEta = function(iso) {
    const d = new Date(iso);
    const now = new Date();
    let age = now.getFullYear() - d.getFullYear();
    const m = now.getMonth() - d.getMonth();
    if (m < 0 || (m === 0 && now.getDate() < d.getDate())) age--;
    return age;
  };

  Screens._dogColor = function(nome) {
    const colors = ['#2C4A2B','#A84F2E','#C8A165','#8A9A7B','#7A3A22','#5A7856'];
    let h = 0;
    for (let i = 0; i < nome.length; i++) h = nome.charCodeAt(i) + ((h << 5) - h);
    return colors[Math.abs(h) % colors.length];
  };

        const d = new Date(u.data + 'T00:00:00');

      Object.values(gruppi).forEach(g => {

  Screens._setupMultiChips = function(containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.querySelectorAll('.chip').forEach(chip => {
      chip.onclick = () => chip.classList.toggle('on');
    });
  };

  Screens._readSingle = function(containerId) {
    const chip = document.querySelector(`#${containerId} .chip.on`);
    return chip ? chip.dataset.value : null;
  };

  Screens._readMulti = function(containerId, attr) {
    return Array.from(document.querySelectorAll(`#${containerId} .chip.on`))
      .map(c => c.getAttribute(attr) || c.dataset.value)
      .filter(Boolean);
  };

  Screens._salvaUscita = async function() {
    const btn = document.getElementById('f-salva');
    const err = document.getElementById('f-err');
    err.textContent = '';

    const zona = (document.getElementById('f-zona').value || '').trim();
    const data = document.getElementById('f-data').value;
    if (!data) { err.textContent = 'Inserisci la data'; return; }
    if (!zona) { err.textContent = 'Inserisci la zona'; return; }

    btn.disabled = true;
    btn.textContent = 'Salvataggio…';

    try {
      const durataVal = document.getElementById('f-durata').value;
      const tempVal = document.getElementById('f-temp').value;
      const base = {
        data,
        zona_nome: zona,
        ora_inizio: document.getElementById('f-ora-in').value || null,
        ora_fine: document.getElementById('f-ora-fi').value || null,
        durata_min: durataVal ? parseInt(durataVal, 10) : null,
        temperatura: tempVal !== '' ? parseInt(tempVal, 10) : null,
        vento: document.getElementById('f-vento').value || null,
        meteo: Screens._readSingle('f-meteo'),
        terreno: Screens._readSingle('f-terreno'),
        note: (document.getElementById('f-note').value || '').trim() || null,
      };

      // Compagni taggati
      const compagniIds = Screens._readMulti('f-compagni', 'data-cacciatore-id');
      const tuttiCacciatori = [cacciatoreAttivo.id, ...compagniIds];

      // Inserisci una riga per ogni partecipante
      const rows = tuttiCacciatori.map(cid => ({ ...base, cacciatore_id: cid }));
      const { data: inseriti, error } = await sb.from('uscite').insert(rows).select();
      if (error) throw error;

      // Trova la mia uscita per segnarla "in corso"
      const miaUscita = (inseriti || []).find(u => u.cacciatore_id === cacciatoreAttivo.id);
      const oggi = new Date().toISOString().split('T')[0];
      if (miaUscita && data === oggi) {
        sessionStorage.setItem('becc_uscita_corso', JSON.stringify({
          id: miaUscita.id,
          zona: zona,
          ts: Date.now(),
        }));
      }

      await Data.loadAll();
      toast('Uscita salvata');

      if (miaUscita && data === oggi) {
        if (confirm('Uscita salvata.\n\nVuoi andare alla Mappa per registrare punti GPS?')) {
          Nav.go('mappa');
          return;
        }
      }
      Nav.go('diario');
    } catch (e) {
      console.error(e);
      err.textContent = 'Errore: ' + (e.message || 'riprova');
      btn.disabled = false;
      btn.textContent = 'Salva cacciata';
    }
  };

  Screens._salvaCane = async function(caneId) {
    const btn = document.getElementById('c-salva');
    const err = document.getElementById('c-err');
    err.textContent = '';
    const nome = (document.getElementById('c-nome').value || '').trim();
    if (!nome) { err.textContent = 'Inserisci il nome'; return; }

    btn.disabled = true;
    btn.textContent = 'Salvataggio…';
    try {
      const payload = {
        cacciatore_id: cacciatoreAttivo.id,
        nome,
        razza: (document.getElementById('c-razza').value || '').trim() || null,
        sesso: document.getElementById('c-sesso').value || null,
        data_nascita: document.getElementById('c-nasc').value || null,
        note: (document.getElementById('c-note').value || '').trim() || null,
        attivo: true,
      };
      if (caneId) {
        const { error } = await sb.from('cani').update(payload).eq('id', caneId);
        if (error) throw error;
      } else {
        const { error } = await sb.from('cani').insert(payload);
        if (error) throw error;

      await Data.loadAll();

      Nav.back();
    } catch (e) {
      console.error(e);
      err.textContent = 'Errore: ' + (e.message || 'riprova');
      btn.disabled = false;
      btn.textContent = 'Salva';
    }
  };

  Screens.dettaglio = async function(tipo, id) {
    const el = document.getElementById('screen-dettaglio');
    el.classList.add('active');
    el.innerHTML = `<div class="empty"><div class="title">Caricamento…</div></div>`;

    let item, table, titolo, sottotitolo;
    const cells = [];

    try {
      if (tipo === 'uscita') {
        const r = await sb.from('uscite').select('*').eq('id', id).single();
        if (r.error) throw r.error;
        item = r.data; table = 'uscite';
        titolo = item.zona_nome || 'Uscita';
        const ora = item.ora_inizio && item.ora_fine ? `${item.ora_inizio.slice(0,5)} — ${item.ora_fine.slice(0,5)}` : item.ora_inizio ? item.ora_inizio.slice(0,5) : '';
        sottotitolo = formatDataLunga(item.data) + (ora ? ' · ' + ora : '');
        if (item.durata_min != null) cells.push({k:'Durata', v:formatDurata(item.durata_min)});
        if (item.temperatura != null) cells.push({k:'Temperatura', v:item.temperatura + '°C'});
        if (item.vento) cells.push({k:'Vento', v:item.vento});
        if (item.meteo) cells.push({k:'Meteo', v:item.meteo});
        if (item.terreno) cells.push({k:'Terreno', v:item.terreno});
      } else if (tipo === 'allenamento') {
        const r = await sb.from('allenamenti').select('*').eq('id', id).single();
        if (r.error) throw r.error;
        item = r.data; table = 'allenamenti';
        titolo = item.luogo || 'Allenamento';
        sottotitolo = formatDataLunga(item.data);
        if (item.durata_min != null) cells.push({k:'Durata', v:formatDurata(item.durata_min)});
        if (item.tipo_addestramento?.length) cells.push({k:'Lavoro', v:item.tipo_addestramento.join(', ')});
        if (item.valutazione) cells.push({k:'Valutazione', v:item.valutazione.replace('_',' ')});
      } else {
        const r = await sb.from('operazioni_riserva').select('*').eq('id', id).single();
        if (r.error) throw r.error;
        item = r.data; table = 'operazioni_riserva';
        titolo = item.tipo === 'rilascio' ? 'Rilascio ripopolamento' : 'Abbattimento nocivi';
        sottotitolo = formatDataLunga(item.data);
        if (item.zona_nome) cells.push({k:'Zona', v:item.zona_nome});
        if (item.momento) cells.push({k:'Momento', v:item.momento});
      }
    } catch (e) {
      el.innerHTML = `<div class="empty"><div class="title">Errore</div><div class="sub">${escapeHtml(e.message)}</div></div>`;
      return;
    }

    el.innerHTML = `
      <div class="detail-head">
        <h1>${escapeHtml(titolo)}</h1>
        <div class="when">${escapeHtml(sottotitolo)}</div>
      </div>
      ${cells.length ? `
        <div class="meta-grid">
          ${cells.map(c => `<div class="meta-cell"><div class="k">${c.k}</div><div class="v">${escapeHtml(c.v)}</div></div>`).join('')}
        </div>` : ''}
      ${item.note ? `<h2>Note</h2><div class="note-box">${escapeHtml(item.note)}</div>` : ''}
      <div style="text-align:center; margin-top:20px;">
        <button class="btn-danger" onclick="Screens._elimina('${table}', '${id}')">Elimina</button>
      </div>
    `;
  };

  const Mappa = {
    map: null,
    userMarker: null,
    userCircle: null,
    eventMarkers: [],
    gpsWatchId: null,
    lastPos: null,
  };

  Screens.mappa = function() {
    const el = document.getElementById('screen-mappa');
    el.classList.add('active');

    // Inizializza Leaflet se necessario
    if (!Mappa.map) {
      Mappa.map = L.map('map', {
        center: [41.9, 12.5],
        zoom: 6,
        zoomControl: true,
        attributionControl: true,
      });

      // Definisci i tre stili di mappa disponibili
      Mappa.tileLayers = {
        satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
          maxZoom: 19,
          maxNativeZoom: 18,
          attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics',
        }),
        topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
          maxZoom: 17,
          attribution: '© OpenStreetMap, SRTM | © OpenTopoMap (CC-BY-SA)',
        }),
        strada: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '© OpenStreetMap',
        }),
      };

      // Stile iniziale: satellite (quello più utile per cacciatori)
      const savedStyle = localStorage.getItem('becc_map_style') || 'satellite';
      Mappa.currentStyle = savedStyle;
      Mappa.tileLayers[savedStyle].addTo(Mappa.map);
      Mappa._updateStyleButtons();

      Mappa._startGps();
    } else {
      setTimeout(() => Mappa.map.invalidateSize(), 120);
    }
    // Forza dimensioni dopo display
    setTimeout(() => Mappa.map.invalidateSize(), 150);

    Mappa._updateBanner();
    Mappa._loadEvents();
  };

  // ---- Cambia stile mappa ----
  Mappa.setStyle = function(style) {
    if (!Mappa.map || !Mappa.tileLayers[style]) return;
    if (Mappa.currentStyle === style) return;
    // Rimuovi layer corrente
    Mappa.map.removeLayer(Mappa.tileLayers[Mappa.currentStyle]);
    // Aggiungi nuovo
    Mappa.tileLayers[style].addTo(Mappa.map);
    Mappa.currentStyle = style;
    localStorage.setItem('becc_map_style', style);
    Mappa._updateStyleButtons();
  };

  Mappa._updateStyleButtons = function() {
    document.querySelectorAll('.map-style-btn').forEach(btn => {
      btn.classList.toggle('on', btn.dataset.style === Mappa.currentStyle);
    });
  };

  Mappa._startGps = function() {
    Mappa._dbg('startGps() chiamata');
    const badge = document.getElementById('gps-badge');
    const text = document.getElementById('gps-text');

    if (!navigator.geolocation) {
      Mappa._dbg('ERRORE: navigator.geolocation NON esiste');
      badge.classList.add('err');
      text.textContent = 'GPS non supportato';
      return;
    }
    Mappa._dbg('navigator.geolocation OK');

    // Reset stato
    badge.classList.remove('err', 'ok');
    text.textContent = 'GPS in attesa…';

    Mappa._dbg('chiamo getCurrentPosition…');

    // Prima richiesta: timeout lungo, alta accuratezza
    navigator.geolocation.getCurrentPosition(
      pos => {
        Mappa._dbg('OK posizione ricevuta: ' + pos.coords.latitude.toFixed(4) + ',' + pos.coords.longitude.toFixed(4) + ' ±' + Math.round(pos.coords.accuracy) + 'm');
        Mappa._onGps(pos, true);
      },
      err => {
        Mappa._dbg('ERRORE getCurrent: code=' + err.code + ' msg=' + (err.message || 'vuoto'));
        // Se è timeout (code 3) riproviamo una volta con bassa accuratezza (più veloce)
        if (err.code === 3) {
          text.textContent = 'GPS sto cercando…';
          Mappa._dbg('retry con bassa accuratezza…');
          navigator.geolocation.getCurrentPosition(
            pos => {
              Mappa._dbg('OK retry: ' + pos.coords.latitude.toFixed(4) + ',' + pos.coords.longitude.toFixed(4));
              Mappa._onGps(pos, true);
            },
            err2 => {
              Mappa._dbg('ERRORE retry: code=' + err2.code + ' msg=' + (err2.message || 'vuoto'));
              Mappa._onGpsErr(err2);
            },
            { enableHighAccuracy: false, timeout: 20000, maximumAge: 60000 }
          );
        } else {
          Mappa._onGpsErr(err);
        }
      },
      { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
    );

    // Watch continuo per aggiornamenti
    if (Mappa.gpsWatchId !== null) {
      navigator.geolocation.clearWatch(Mappa.gpsWatchId);
    }
    Mappa.gpsWatchId = navigator.geolocation.watchPosition(
      pos => Mappa._onGps(pos, false),
      err => {
        Mappa._dbg('watch err: code=' + err.code);
        if (!Mappa.lastPos) Mappa._onGpsErr(err);
      },
      { enableHighAccuracy: true, timeout: 30000, maximumAge: 5000 }
    );
    Mappa._dbg('watch registrato, id=' + Mappa.gpsWatchId);
  };

  // ---- Log GPS (solo console, senza pannello a schermo) ----
  Mappa._dbg = function(msg) {
    console.log('[GPS]', msg);
  };

  Mappa._onGps = function(pos, isFirst) {
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;
    Mappa.lastPos = { lat, lng, accuracy };

    const badge = document.getElementById('gps-badge');
    const text = document.getElementById('gps-text');
    badge.classList.remove('err');
    badge.classList.add('ok');
    text.textContent = 'GPS ± ' + Math.round(accuracy) + 'm';

    if (!Mappa.map) return;

    if (Mappa.userMarker) {
      Mappa.userMarker.setLatLng([lat, lng]);
    } else {
      const ic = L.divIcon({
        className: '',
        html: '<div class="user-pin"></div>',
        iconSize: [22, 22],
        iconAnchor: [11, 11],
      });
      Mappa.userMarker = L.marker([lat, lng], { icon: ic, zIndexOffset: 1000, interactive: false }).addTo(Mappa.map);
    }

    if (Mappa.userCircle) {
      Mappa.userCircle.setLatLng([lat, lng]);
      Mappa.userCircle.setRadius(accuracy);
    } else {
      Mappa.userCircle = L.circle([lat, lng], {
        radius: accuracy,
        color: '#1e90ff',
        fillColor: '#1e90ff',
        fillOpacity: 0.08,
        weight: 1,
        interactive: false,
      }).addTo(Mappa.map);
    }

    if (isFirst) {
      Mappa.map.setView([lat, lng], 16);
    }
  };

  Mappa._onGpsErr = function(err) {
    const badge = document.getElementById('gps-badge');
    const text = document.getElementById('gps-text');
    badge.classList.remove('ok');
    badge.classList.add('err');
    badge.style.cursor = 'pointer';

    // Salvo info errore per diagnostica
    Mappa._lastError = {
      code: err.code,
      message: err.message || 'nessun messaggio',
      time: new Date().toLocaleTimeString('it-IT'),
    };

    if (err.code === 1) {
      text.textContent = 'GPS negato — tocca';
      badge.onclick = Mappa._showGpsHelp;
    } else if (err.code === 2) {
      text.textContent = 'GPS non disponibile';
      badge.onclick = Mappa._showGpsDiag;
    } else if (err.code === 3) {
      text.textContent = 'GPS lento — tocca';
      badge.onclick = Mappa._startGps;
    } else {
      text.textContent = 'GPS errore — tocca';
      badge.onclick = Mappa._showGpsDiag;
    }
  };

  // Diagnostica dettagliata GPS: mostra il messaggio di errore reale
  Mappa._showGpsDiag = function() {
    const e = Mappa._lastError || { code: '?', message: 'nessun errore salvato', time: '—' };
    const codeLabels = {
      1: "PERMISSION_DENIED (permesso negato)",
      2: "POSITION_UNAVAILABLE (posizione non ottenibile)",
      3: "TIMEOUT (il GPS ci mette troppo a rispondere)",
    };
    const msg =
      "Diagnostica GPS\n\n" +
      "Codice errore: " + e.code + "\n" +
      "Tipo: " + (codeLabels[e.code] || 'sconosciuto') + "\n" +
      "Messaggio: " + e.message + "\n" +
      "Ora: " + e.time + "\n\n" +
      "Vuoi riprovare ora?";
    if (confirm(msg)) {
      Mappa._startGps();
    }
  };

  // Istruzioni per attivare il GPS quando è negato
  Mappa._showGpsHelp = function() {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const isSafari = /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);
    let msg;
    if (isIOS) {
      msg = "Il GPS è bloccato.\n\nPer sbloccarlo:\n\n" +
            "1. Apri Impostazioni iPhone\n" +
            "2. Scorri giù → tocca 'Safari'\n" +
            "3. Tocca 'Localizzazione' → 'Consenti'\n\n" +
            "Oppure ricarica la pagina e, quando Safari chiede il permesso, tocca 'Consenti'.\n\n" +
            "Vuoi provare a ricaricare ora?";
    } else {
      msg = "Il GPS è bloccato.\n\n" +
            "Cerca l'icona del lucchetto nella barra indirizzi, tocca 'Permessi sito' e attiva la posizione.\n\n" +
            "Vuoi provare a ricaricare la pagina?";
    }
    if (confirm(msg)) {
      location.reload();
    }
  };

  Mappa._updateBanner = function() {
    const banner = document.getElementById('map-banner');
    const text = document.getElementById('map-banner-text');
    const uscita = Mappa._getUscitaCorso();
    if (uscita) {
      banner.classList.add('attiva');
      text.innerHTML = `<b>Uscita in corso</b><span class="sub">${escapeHtml(uscita.zona || '')}</span>`;
    } else {
      banner.classList.remove('attiva');
      text.innerHTML = `<b>Nessuna uscita aperta</b><span class="sub">Aprine una per registrare punti GPS</span>`;
    }
  };

  Mappa._getUscitaCorso = function() {
    try {
      const raw = sessionStorage.getItem('becc_uscita_corso');
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (Date.now() - (obj.ts || 0) > 18 * 3600 * 1000) {
        sessionStorage.removeItem('becc_uscita_corso');
        return null;
      }
      return obj;
    } catch (e) { return null; }
  };

  Mappa._loadEvents = function() {
    if (!Mappa.map) return;
    Mappa.eventMarkers.forEach(m => Mappa.map.removeLayer(m));
    Mappa.eventMarkers = [];

    Data.eventi.forEach(ev => {
      if (ev.latitudine == null || ev.longitudine == null) return;
      const inner = ev.tipo === 'abbattuta' ? '●' : '🪶';
      const ic = L.divIcon({
        className: '',
        html: `<div class="event-pin ${ev.tipo}"><span class="inner">${inner}</span></div>`,
        iconSize: [26, 26],
        iconAnchor: [13, 26],
        popupAnchor: [0, -24],
      });
      const m = L.marker([ev.latitudine, ev.longitudine], { icon: ic }).addTo(Mappa.map);
      m.bindPopup(Mappa._popup(ev));
      Mappa.eventMarkers.push(m);
    });
  };

  Mappa._popup = function(ev) {
    const when = new Date(ev.created_at);
    const ora = when.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    const giorno = when.getDate() + ' ' + MESI_CORTI[when.getMonth()].toLowerCase();
    const tipoLabel = ev.tipo === 'abbattuta' ? 'Abbattuta' : 'Incontro';
    const cf = ev.cane_id ? Data.getCane(ev.cane_id) : null;
    const cr = ev.cane_riporto_id ? Data.getCane(ev.cane_riporto_id) : null;

    return `
      <div class="popup-title">${tipoLabel}</div>
      <div class="popup-meta">${giorno} · ${ora}${ev.specie_nome ? ' · ' + escapeHtml(ev.specie_nome) : ''}</div>
      ${cf ? `<div class="popup-meta">Ferma: <b>${escapeHtml(cf.nome)}</b></div>` : ''}
      ${cr ? `<div class="popup-meta">Riporto: <b>${escapeHtml(cr.nome)}</b></div>` : ''}
      ${ev.note ? `<div class="popup-note">${escapeHtml(ev.note)}</div>` : ''}
      <div class="popup-del"><button onclick="Screens._eliminaEvento('${ev.id}')">Elimina</button></div>
    `;
  };

  Screens._eliminaEvento = async function(id) {
    if (!confirm('Eliminare questo punto?')) return;
    try {
      const { error } = await sb.from('eventi').delete().eq('id', id);
      if (error) throw error;
      await Data.loadAll();
      Mappa._loadEvents();
      toast('Punto eliminato');
    } catch (e) {
      alert('Errore: ' + (e.message || 'riprova'));
    }
  };

  // Aggiunta punto GPS dal FAB
  Screens.addPuntoGPS = function() {
    const uscita = Mappa._getUscitaCorso();
    if (!uscita) {
      if (confirm("Non hai ancora aperto un'uscita.\n\nPer registrare punti GPS devi prima aprire una cacciata.\n\nVuoi aprirla ora?")) {
        Nav.go('form-uscita');
      }
      return;
    }
    if (!Mappa.lastPos) {
      // Controlla se il badge dice "negato"
      const badge = document.getElementById('gps-badge');
      const isNegato = badge && badge.classList.contains('err');
      if (isNegato) {
        Mappa._showGpsHelp();
      } else {
        // Prova a forzare un nuovo getCurrentPosition
        alert("Posizione GPS non ancora pronta.\n\nAspetta qualche secondo che il segnale si stabilizzi, poi riprova.");
        Mappa._startGps();
      }
      return;
    }
    Nav.go('form-punto');
  };

  // ======================================================================
  // FORM PUNTO GPS
  // ======================================================================
  Screens.formPunto = function() {
    const el = document.getElementById('screen-form-punto');
    el.classList.add('active');

    const uscita = Mappa._getUscitaCorso();
    const pos = Mappa.lastPos;
    if (!uscita || !pos) {
      el.innerHTML = `<div class="empty"><div class="title">Impossibile aggiungere punto</div><div class="sub">Riprova dalla mappa</div></div>`;
      return;
    }

    const caniChipsFerma = Data.cani.map(c =>
      `<div class="chip" data-cane-id="${c.id}">${escapeHtml(c.nome)}</div>`
    ).join('') || `<div style="font-size:12px; color:var(--ink-mute); font-style:italic;">Nessun cane registrato</div>`;

    el.innerHTML = `
      <h1 class="screen-title">Nuovo <em>punto</em></h1>
      <div class="subtitle">Registra cosa è successo</div>

      <div style="background:var(--paper-2); border:1px solid var(--paper-edge); border-radius:var(--radius); padding:10px 14px; margin-bottom:14px; display:flex; gap:10px; align-items:center; position:relative; z-index:3;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--forest); flex-shrink:0;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <div style="font-size:12px; color:var(--ink-soft); line-height:1.4;">
          <b>GPS acquisito</b> · precisione ± ${Math.round(pos.accuracy)}m<br>
          <span style="color:var(--ink-mute);">Uscita: ${escapeHtml(uscita.zona || '—')}</span>
        </div>
      </div>

      <div class="field">
        <label>Cosa è successo? *</label>
        <div class="chip-row" id="p-tipo">
          <div class="chip on" data-value="incontro" style="background:var(--ochre); color:var(--forest-deep); border-color:var(--ochre);">🪶 Incontro</div>
          <div class="chip" data-value="abbattuta" style="border:1px solid var(--russet); color:var(--russet);">🎯 Abbattuta</div>
        </div>
        <div class="field-hint">L'incontro include la ferma. L'abbattuta include anche il riporto.</div>
      </div>

      <div class="field">
        <label>Specie</label>
        <div class="chip-row" id="p-specie">
          <div class="chip on" data-value="Beccaccia">Beccaccia</div>
          <div class="chip" data-value="Beccaccino">Beccaccino</div>
          <div class="chip" data-value="Tordo">Tordo</div>
          <div class="chip" data-value="Colombaccio">Colombaccio</div>
          <div class="chip" data-value="Fagiano">Fagiano</div>
          <div class="chip" data-value="Starna">Starna</div>
          <div class="chip" data-value="Quaglia">Quaglia</div>
          <div class="chip" data-value="Lepre">Lepre</div>
        </div>
      </div>

      <div class="field">
        <label>Cane che ha fermato</label>
        <div class="chip-row" id="p-ferma">${caniChipsFerma}</div>
      </div>

      <div class="field" id="p-riporto-field" style="display:none;">
        <label>Cane che ha riportato</label>
        <div class="chip-row" id="p-riporto">${caniChipsFerma}</div>
      </div>

      <div class="field">
        <label>Note</label>
        <textarea id="p-note" placeholder="Es. azione veloce, beccaccia bassa..."></textarea>
      </div>

      <button class="btn-primary" id="p-salva" onclick="Screens._salvaPunto()">Salva punto</button>
      <button class="btn-secondary" onclick="Nav.back()">Annulla</button>
      <div class="form-error" id="p-err"></div>
    `;

    Screens._setupSingleChips('p-tipo');
    Screens._setupSingleChips('p-specie');
    Screens._setupSingleChips('p-ferma');
    Screens._setupSingleChips('p-riporto');

    // Mostra campo riporto solo se abbattuta
    document.querySelectorAll('#p-tipo .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.getElementById('p-riporto-field').style.display =
          chip.dataset.value === 'abbattuta' ? '' : 'none';
      });
    });
  };

  Screens._salvaPunto = async function() {
    const btn = document.getElementById('p-salva');
    const err = document.getElementById('p-err');
    err.textContent = '';

    const uscita = Mappa._getUscitaCorso();
    const pos = Mappa.lastPos;
    if (!uscita || !pos) { err.textContent = 'Posizione o uscita mancante'; return; }

    const tipo = Screens._readSingle('p-tipo');
    const specie = Screens._readSingle('p-specie');
    if (!tipo) { err.textContent = 'Seleziona il tipo'; return; }

    btn.disabled = true;
    btn.textContent = 'Salvataggio…';
    try {
      const caneFerma = Screens._readMulti('p-ferma', 'data-cane-id')[0] || null;
      const caneRiporto = tipo === 'abbattuta' ? (Screens._readMulti('p-riporto', 'data-cane-id')[0] || null) : null;
      const payload = {
        uscita_id: uscita.id,
        cacciatore_id: cacciatoreAttivo.id,
        tipo,
        specie_nome: specie,
        latitudine: pos.lat,
        longitudine: pos.lng,
        cane_id: caneFerma,
        cane_riporto_id: caneRiporto,
        note: (document.getElementById('p-note').value || '').trim() || null,
      };
      const { error } = await sb.from('eventi').insert(payload);
      if (error) throw error;
      await Data.loadAll();
      toast('Punto salvato');
      Nav.go('mappa');
    } catch (e) {
      console.error(e);
      err.textContent = 'Errore: ' + (e.message || 'riprova');
      btn.disabled = false;
      btn.textContent = 'Salva punto';
    }
  };

  // ======================================================================
  // ESPONI globalmente
  // ======================================================================
  window.Auth = Auth;
  window.Nav = Nav;
  window.FAB = FAB;
  window.Menu = Menu;
  window.Screens = Screens;
  window.Mappa = Mappa;
  window.Data = Data;

  // ======================================================================
  // AVVIO
  // ======================================================================
  document.addEventListener('DOMContentLoaded', () => {
    Auth.init();
  });

})();
</script>

</body>
</html>
